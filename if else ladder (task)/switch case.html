<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Switch case</title>
</head>
<body>
    
    <script>
        let path = prompt("Enter page name:");

        switch(path){
              case "/About":
                document.write("Welcome to About page.!")
                break;

            case "/contact":
                document.write("Welcome to Contact page.!");
                break;
          
            case "/services":
                document.write("Welcome to services page.!")
                break;

            default:
                document.write("Welcome to Home page.!")
            
        }
    </script>
</body>
</html>
