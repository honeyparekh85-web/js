<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Product Management</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <h2> Product Manager</h2>
        <div id="error" class="error"></div>
        <input id="name" type="text" placeholder="Product name">
        <input id="description" type="text" placeholder="Description">
        <input id="price" type="text" placeholder="Price">
        <input id="image" type="text" placeholder="Image URL">
        <button onclick="addProduct()">Add Product</button>
        <div id="product-list"></div>
    </div>

    <script>
        const products = [];
        const productList = document.getElementById('product-list');
        const errorDiv = document.getElementById('error');

        function addProduct() {
            const name = document.getElementById('name').value.trim();
            const description = document.getElementById('description').value.trim();
            const priceText = document.getElementById('price').value.trim();
            const image = document.getElementById('image').value.trim();

            if (name === '' || description === '' || priceText === '' || image === '') {
                errorDiv.textContent = 'Please fill all fields.';
                return;
            }

            const price = Number(priceText);
            if (isNaN(price) || price <= 0) {
                errorDiv.textContent = 'Price must be a positive number.';
                return;
            }

            if (!image.startsWith('http://') && !image.startsWith('https://')) {
                errorDiv.textContent = 'Image URL must start with http:// or https://';
                return;
            }

            errorDiv.textContent = '';

            products.push({ name, description, price, image });
            renderProducts();
            clearInputs();
        }

        function renderProducts() {
            productList.innerHTML = '';
            for (const product of products) {
                const div = document.createElement('div');
                div.className = 'product';
                div.innerHTML = `
                    <img src="${product.image}" alt="${product.name}">
                    <div class="product-details">
                        <strong>${product.name}</strong>
                        ${product.description}<br>
                        Price: ₹${product.price}
                    </div>
                `;
                productList.appendChild(div);
            }
        }

        function clearInputs() {
            document.getElementById('name').value = '';
            document.getElementById('description').value = '';
            document.getElementById('price').value = '';
            document.getElementById('image').value = '';
        }

    </script>
</body>
</html>
