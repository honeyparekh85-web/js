<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corona API</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            text-align: center;
            padding: 40px;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            background: #e53935;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #c62828;
        }

        .box {
            margin-top: 30px;
            display: inline-block;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            min-width: 300px;
        }

        p {
            font-size: 18px;
            margin: 10px 0;
        }
    </style>
</head>

<body>

    <h1>Corona Virus Live Data</h1>
    <button onclick="getData()">Get Corona Data</button>

    <div class="box">
        <p>Total Cases: <span id="cases">-</span></p>
        <p>Total Deaths: <span id="deaths">-</span></p>
        <p>Total Recovered: <span id="recovered">-</span></p>
    </div>

    <script>
        function getData() {

            fetch("https://disease.sh/v3/covid-19/all")
                .then(response => response.json())
                .then(data => {
                    console.log(data); // see API data in console

                    document.getElementById("cases").innerText = data.cases;
                    document.getElementById("deaths").innerText = data.deaths;
                    document.getElementById("recovered").innerText = data.recovered;
                })
                .catch(error => {
                    console.log("Error:", error);
                });
        }
    </script>

</body>
</html>
