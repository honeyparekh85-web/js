<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Recipe Book</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<!-- PART - 1: STYLING SECTION -->
<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #2d3436, #000000);
    color: #f8f9fa;
    min-height: 100vh;
    padding: 40px 20px;
}

h1 {
    text-align: center;
    font-weight: 800;
    font-size: 3.5rem;
    margin-bottom: 40px;
    background: linear-gradient(135deg, #6c5ce7, #00b894);
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
}

.container {
    max-width: 1100px;
    margin: auto;
    background: #1a1a1a;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    border: 1px solid #333;
}

/* FORM */
.form-section {
    background: #252525;
    padding: 30px;
    border-radius: 15px;
    margin-bottom: 40px;
    border: 1px solid #333;
}

.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.form-grid textarea {
    grid-column: span 2;
}

input, textarea, select {
    padding: 14px;
    border-radius: 10px;
    border: 2px solid #333;
    background: #1a1a1a;
    color: #fff;
    font-size: 16px;
    outline: none;
    transition: all 0.3s;
}

input:focus, textarea:focus, select:focus {
    border-color: #00b894;
    box-shadow: 0 0 0 4px rgba(0,184,148,0.15);
}

textarea {
    min-height: 100px;
    resize: vertical;
}

button.primary-btn {
    grid-column: span 2;
    padding: 16px;
    border-radius: 10px;
    border: none;
    font-size: 18px;
    font-weight: 600;
    background: #00b894;
    color: white;
    cursor: pointer;
    transition: all 0.3s;
}

button.primary-btn:hover {
    background: #00a887;
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,184,148,0.3);
}

/* SEARCH */
.search-filter {
    display: flex;
    gap: 15px;
    margin-bottom: 15px;
}

.search-filter input {
    flex: 2;
}

.search-filter select {
    flex: 1;
}

#statusMsg {
    margin-bottom: 25px;
    font-size: 14px;
    min-height: 20px;
}

/* RECIPES */
#recipeList {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 25px;
}

.recipe {
    background: #252525;
    padding: 25px;
    border-radius: 15px;
    border: 1px solid #333;
    transition: all 0.3s;
    display: flex;
    flex-direction: column;
}

.recipe:hover {
    transform: translateY(-10px);
    box-shadow: 0 15px 30px rgba(0,0,0,0.4);
}

.recipe-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
}

.recipe h3 {
    margin: 0;
    font-size: 1.4rem;
}

.badge {
    background: #333;
    color: #00b894;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
}

.recipe p {
    font-size: 15px;
    color: #b2bec3;
    line-height: 1.6;
}

.recipe strong {
    color: #dfe6e9;
    display: block;
}

details summary {
    cursor: pointer;
    font-weight: 600;
    margin-top: 10px;
}

.actions {
    margin-top: 20px;
    display: flex;
    gap: 10px;
}

.actions button {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    font-weight: 600;
    cursor: pointer;
}

.edit-btn {
    background: #6c5ce7;
    color: white;
}

.delete-btn {
    background: #ff7675;
    color: white;
}

.empty {
    text-align: center;
    padding: 60px;
    color: #636e72;
    font-size: 18px;
}
</style>
</head>

<!-- PART - 2: HTML STRUCTURE -->
<body>

<h1><i class="fa-solid fa-utensils"></i> My Recipe Book</h1>

<div class="container">

<input type="hidden" id="recipeId">

<div class="form-section">
    <div class="form-grid">
        <input type="text" id="title" placeholder="Recipe Title">
        <select id="cuisine">
            <option value="">Cuisine Type</option>
            <option>Indian</option>
            <option>Italian</option>
            <option>Chinese</option>
            <option>Mexican</option>
            <option>Other</option>
        </select>

        <textarea id="ingredients" placeholder="Ingredients (one per line)"></textarea>
        <textarea id="instructions" placeholder="Step-by-step instructions"></textarea>

        <button class="primary-btn" onclick="addRecipe()">
            <i class="fa-solid fa-circle-plus"></i> Add / Update Recipe
        </button>
    </div>
</div>

<div class="search-filter">
    <input type="text" id="search" placeholder="🔍 Search food, ingredients or cuisine..." onkeyup="displayRecipes()">
    <select id="filterCuisine" onchange="displayRecipes()">
        <option value="">All Cuisines</option>
        <option>Indian</option>
        <option>Italian</option>
        <option>Chinese</option>
        <option>Mexican</option>
        <option>Other</option>
    </select>
</div>

<div id="statusMsg"></div>

<div id="recipeList"></div>
</div>

<!-- PART - 3: JAVASCRIPT LOGIC -->
<script>
let recipes = JSON.parse(localStorage.getItem("recipes")) || [];

const recipeIdInput = document.getElementById("recipeId");
const titleInput = document.getElementById("title");
const cuisineInput = document.getElementById("cuisine");
const ingredientsInput = document.getElementById("ingredients");
const instructionsInput = document.getElementById("instructions");
const searchInput = document.getElementById("search");
const filterCuisineInput = document.getElementById("filterCuisine");
const recipeListContainer = document.getElementById("recipeList");
const statusMsg = document.getElementById("statusMsg");

function saveData() {
    localStorage.setItem("recipes", JSON.stringify(recipes));
}

function showStatus(msg, color = "#00b894") {
    statusMsg.style.color = color;
    statusMsg.textContent = msg;
    setTimeout(() => statusMsg.textContent = "", 2500);
}

function addRecipe() {
    const id = recipeIdInput.value;
    const titleVal = titleInput.value.trim();
    const ingredientsVal = ingredientsInput.value.trim();
    const instructionsVal = instructionsInput.value.trim();
    const cuisineVal = cuisineInput.value;

    if (!titleVal || !ingredientsVal) {
        showStatus("⚠ Title and ingredients are required", "#ff7675");
        return;
    }

    if (id) {
        const recipe = recipes.find(r => r.id === id);
        if (recipe) {
            Object.assign(recipe, {
                title: titleVal,
                ingredients: ingredientsVal,
                instructions: instructionsVal,
                cuisine: cuisineVal
            });
            showStatus("✏ Recipe updated");
        }
    } else {
        recipes.push({
            id: Date.now().toString(),
            title: titleVal,
            ingredients: ingredientsVal,
            instructions: instructionsVal,
            cuisine: cuisineVal
        });
        showStatus("✅ Recipe added");
    }

    clearForm();
    saveData();
    displayRecipes();
}

function displayRecipes() {
    recipeListContainer.innerHTML = "";
    const searchText = searchInput.value.toLowerCase();
    const filter = filterCuisineInput.value;

    const filtered = recipes.filter(r =>
        (r.title.toLowerCase().includes(searchText) ||
         r.ingredients.toLowerCase().includes(searchText) ||
         (r.cuisine && r.cuisine.toLowerCase().includes(searchText))) &&
        (filter === "" || r.cuisine === filter)
    );

    if (filtered.length === 0) {
        recipeListContainer.innerHTML = `
        <div class="empty">
            <i class="fa-solid fa-utensils" style="font-size: 3rem; margin-bottom: 20px; display: block; color: #333;"></i>
            No recipes found. Start by adding one!
        </div>`;
        return;
    }

    filtered.forEach(r => {
        recipeListContainer.innerHTML += `
        <div class="recipe">
            <div class="recipe-header">
                <h3>${r.title}</h3>
                <span class="badge">${r.cuisine || "General"}</span>
            </div>

            <p><strong>Ingredients:</strong>${r.ingredients.replace(/\n/g,"<br>")}</p>

            <details>
                <summary>View Instructions</summary>
                <p>${r.instructions.replace(/\n/g,"<br>")}</p>
            </details>

            <div class="actions">
                <button class="edit-btn" onclick="editRecipe('${r.id}')">
                    <i class="fa-solid fa-pen-to-square"></i> Edit
                </button>
                <button class="delete-btn" onclick="deleteRecipe('${r.id}')">
                    <i class="fa-solid fa-trash-can"></i> Delete
                </button>
            </div>
        </div>`;
    });
}

function editRecipe(id) {
    const r = recipes.find(x => x.id === id);
    if (r) {
        recipeIdInput.value = r.id;
        titleInput.value = r.title;
        ingredientsInput.value = r.ingredients;
        instructionsInput.value = r.instructions;
        cuisineInput.value = r.cuisine;
        window.scrollTo({ top: 0, behavior: 'smooth' });
        showStatus("✏ Editing recipe", "#6c5ce7");
    }
}

function deleteRecipe(id) {
    if (confirm("Are you sure you want to delete this recipe?")) {
        recipes = recipes.filter(r => r.id !== id);
        saveData();
        displayRecipes();
        showStatus("🗑 Recipe deleted", "#ff7675");
    }
}

function clearForm() {
    recipeIdInput.value = "";
    titleInput.value = "";
    ingredientsInput.value = "";
    instructionsInput.value = "";
    cuisineInput.value = "";
}

displayRecipes();
</script>

</body>
</html>
