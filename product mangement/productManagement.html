<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Practical Test: Product Management 
System (CRUD) </title>
</head>

<body>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        table {
            width: 90%;
            margin: 4% auto;
        }

        table,
        th,
        tr,
        td {
            border: 1px solid black;
            border-collapse: collapse;
            padding: 9px;
        }

        button {
            padding: 10px 26px;
            margin: 0 14px;
            border: 0;
            border-radius: 5px;
            background-color: black;
            color: white;
            cursor: pointer;
        }

        .btn2 {
            background-color: rgb(192, 229, 241);
        }

        caption {
            margin: 12px 0;
        }

        td img {
            width: 80px;
           
        }

   
    </style>
    </head>

    <body>

        <table>
            <caption>
                <h1>Product Management</h1>
            </caption>
            <thead>
                <tr>
                    <th>Id</th>
                    <th>Image</th>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Price</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="productTable">

            </tbody>
        </table>



        <div class="form-container">
            <input type="text" placeholder="Enter Name" id="name">
            <input type="text" placeholder="Enter Description" id="description">
            <input type="text" placeholder="Enter Price" id="price">

            <input type="text" placeholder="Enter Image URL" id="image">
            <button onclick="addProduct()">Add Product</button>
        </div>

        <script>

            const products = [
                {
                    id: 1,
                    name: "Espresso",
                    description: "Strong and bold single-shot coffee",
                    price: 199,
                    image: "https://images.unsplash.com/photo-1510707577719-ae7c14805e3a?w=500"
                },
                {
                    id: 2,
                    name: "Americano",
                    description: "Espresso mixed with hot water for a smooth taste",
                    price: 219,
                    image: "https://images.unsplash.com/photo-1494314671902-399b18174975?w=500"
                },
                {
                    id: 3,
                    name: "Flat White",
                    description: "Velvety steamed milk with rich espresso",
                    price: 269,
                    image: "https://images.unsplash.com/photo-1523942839745-7848d6d515c6?w=500"
                },
                {
                    id: 4,
                    name: "Iced Latte",
                    description: "Refreshing espresso with chilled milk and ice",
                    price: 289,
                    image: "https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=500"
                },
                {
                    id: 5,
                    name: "Hazelnut Latte",
                    description: "Creamy latte infused with hazelnut syrup",
                    price: 329,
                    image: "https://images.unsplash.com/photo-1497935586351-b67a49e012bf?w=500"
                }]

            const displayProducts = () => {
                const productTable = document.getElementById("productTable");
                productTable.innerHTML = "";

                products.forEach((product) => {
                    productTable.innerHTML += `<tr>
                        <td>${product.id}</td>
                        <td><img src="${product.image}" alt="${product.name}" /></td>
                        <td>${product.name}</td>
                        <td>${product.description}</td>
                        <td>${product.price}</td>
                        <td>${product.category}</td>
                        <td><button>Edit</button><button class="btn2">Delete</button></td>
                    </tr>`;
                })
            }

            const addProduct = () => {
                let name = document.getElementById("name").value;
                let description = document.getElementById("description").value;
                let price = document.getElementById("price").value;
                let category = document.getElementById("category").value;
                let image = document.getElementById("image").value;

                const newProduct = {
                    id: products.length + 1,
                    name,
                    description,
                    price: Number(price),
                    category,
                    image
                }

                products.push(newProduct);

                displayProducts();
            }


            displayProducts();

        </script>
    </body>

</html>
