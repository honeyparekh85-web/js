<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quotes Countdown</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #5a00ff, #009dff, #8a2be2);
        background-size: 300% 300%;
        animation: gradientMove 10s ease infinite;
        font-family: "Poppins", sans-serif;
        color: white;
    }

    @keyframes gradientMove {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .card {
        width: 380px;
        padding: 30px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(15px);
        box-shadow: 0 0 30px rgba(255,255,255,0.2);
        text-align: center;
        animation: fadeIn 0.7s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .quote {
        font-size: 20px;
        line-height: 1.6;
        margin-bottom: 30px;
        font-weight: 500;
    }

    button {
        padding: 10px 20px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(135deg, #00d0ff, #7000ff);
        color: white;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.08);
        box-shadow: 0 0 15px rgba(255,255,255,0.3);
    }
</style>
</head>
<body>

<div class="card">
    <div class="quote" id="quoteText">Loading quote...</div>
    <button onclick="nextQuote()">New Quote</button>
</div>

<script>
    const quotes = [
        "Believe you can and you're halfway there.",
        "Every moment is a fresh beginning.",
        "Dream big and dare to fail.",
        "Success doesn't come to you — you go to it.",
        "Stay patient and trust your journey.",
        "You are stronger than you think.",
        "Push yourself, because no one else will do it for you.",
        "Great things never come from comfort zones.",
        "If you can dream it, you can do it.",
        "Work hard in silence, let success make the noise."
    ];

    let timeLeft = 10;
    let timer;

    function startCountdown() {
        timer = setInterval(() => {
            timeLeft--;

            if (timeLeft === 0) {
                nextQuote();
            }
        }, 1000);
    }

    function nextQuote() {
        clearInterval(timer);

        const random = Math.floor(Math.random() * quotes.length);
        document.getElementById("quoteText").innerText = quotes[random];

        timeLeft = 10;
        startCountdown();
    }

    nextQuote(); // Start immediately
</script>

</body>
</html>
