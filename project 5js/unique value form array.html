<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
let arr = [1, 2, 3, 2, 1, 5, 7, 5];
let unique = [];

for (let i = 0; i < arr.length; i++) {
  let isDuplicate = false;

  // check if arr[i] is already in unique[]
  for (let j = 0; j < unique.length; j++) {
    if (arr[i] === unique[j]) {
      isDuplicate = true;
      break;
    }
  }

  // if not duplicate, push it
  if (!isDuplicate) {
    unique[unique.length] = arr[i];
  }
}

console.log(unique);


    </script>
    
</body>
</html>
