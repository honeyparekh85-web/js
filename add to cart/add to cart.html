<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ElectroShop - Add to Cart</title>

<style>
/* ---------------- GLOBAL STYLE ---------------- */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}
body{
  background:linear-gradient(135deg, #dbe9ff, #d9d0ff, #c7e2ff);
  background-attachment:fixed;
  min-height:100vh;
  overflow-x:hidden;
}

/* ---------------- NAVBAR ---------------- */
.navbar{
  width:100%;
  padding:15px 5%;
  background:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  position:sticky;
  top:0;
  z-index:100;
}
.navbar h2{
  color:#222;
}
.search-box{
  display:flex;
  align-items:center;
  background:white;
  border:2px solid #ccc;
  padding:6px 14px;
  border-radius:30px;
  transition:0.3s;
}
.search-box:hover{
  border-color:#333;
  box-shadow:0 0 6px rgba(0,0,0,0.2);
}
.search-box input{
  border:none;
  outline:none;
  padding:8px;
  width:220px;
}
.cart{
  font-size:18px;
  background:#333;
  color:white;
  padding:8px 16px;
  border-radius:20px;
  cursor:pointer;
  transition:0.3s;
}
.cart:hover{
  background:#555;
}

/* ---------------- HERO IMAGE ---------------- */
.hero{
  width:100%;
  height:250px;
  background:url("https://images.unsplash.com/photo-1517336714731-489689fd1ca8") no-repeat center/cover;
  border-radius:10px;
  margin:20px auto;
  width:90%;
  display:flex;
  align-items:center;
  justify-content:center;
}
.hero h1{
  background:rgba(0,0,0,0.5);
  padding:10px 25px;
  color:white;
  border-radius:12px;
}

/* ---------------- PRODUCTS ---------------- */
.products{
  width:90%;
  margin:30px auto;
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
  gap:20px;
}

/* ---------------- PRODUCT CARD ---------------- */
.card{
  background:white;
  padding:15px;
  border-radius:12px;
  box-shadow:0 3px 8px rgba(0,0,0,0.1);
  transition:0.3s;
}
.card:hover{
  transform:translateY(-5px);
  box-shadow:0 6px 12px rgba(0,0,0,0.2);
}
.card img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:10px;
}
.card h3{
  margin:10px 0;
}
.card p{
  color:#555;
  margin-bottom:12px;
}
.card button{
  width:100%;
  padding:10px;
  border:none;
  background:#333;
  color:white;
  border-radius:25px;
  cursor:pointer;
  transition:0.3s;
}
.card button:hover{
  background:white;
  color:#333;
  border:2px solid #333;
}

/* ---------------- SLIDE CART ---------------- */
.cart-panel{
  position:fixed;
  top:0;
  right:-400px;
  width:350px;
  height:100%;
  background:white;
  box-shadow:-3px 0 10px rgba(0,0,0,0.2);
  transition:0.4s ease;
  padding:20px;
  z-index:200;
  display:flex;
  flex-direction:column;
}
.cart-panel.active{
  right:0;
}
.cart-panel h2{
  text-align:center;
  margin-bottom:20px;
  border-bottom:1px solid #ddd;
  padding-bottom:10px;
}
.cart-items{
  flex:1;
  overflow-y:auto;
}
.cart-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 0;
  border-bottom:1px solid #ddd;
}
.cart-item:last-child{
  border-bottom:none;
}
.cart-item span{
  font-size:14px;
}
.qty-btn{
  background:#333;
  color:white;
  border:none;
  padding:4px 8px;
  margin:0 3px;
  border-radius:4px;
  cursor:pointer;
}
.cart-item button{
  background:#f44336;
  color:white;
  border:none;
  padding:5px 10px;
  border-radius:5px;
  cursor:pointer;
  transition:0.3s;
}
.cart-item button:hover{
  background:#d32f2f;
}
.total{
  margin-top:15px;
  font-weight:bold;
  text-align:right;
}
.close-btn{
  background:none;
  border:none;
  font-size:20px;
  position:absolute;
  right:15px;
  top:10px;
  cursor:pointer;
}
.checkout-btn{
  background:#333;
  color:white;
  border:none;
  padding:10px;
  border-radius:25px;
  width:100%;
  margin-top:15px;
  cursor:pointer;
  transition:0.3s;
}
.checkout-btn:hover{
  background:#111;
}

/* RESPONSIVE */
@media(max-width:600px){
  .search-box input{ width:120px; }
  .cart-panel{ width:100%; }
}
</style>
</head>

<body>

<!-- ---------------- NAVBAR ---------------- -->
<div class="navbar">
  <h2>ElectroShop</h2>
  <div class="search-box">
    <input type="text" placeholder="Search products...">
  </div>
  <div class="cart" onclick="toggleCart()">🛒 Cart: <span id="cart-count">0</span></div>
</div>

<!-- ---------------- HERO ---------------- -->
<div class="hero">
  <h1>Best Electronics Deals</h1>
</div>

<!-- ---------------- PRODUCTS ---------------- -->
<div class="products">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8" alt="">
    <h3>Gaming Laptop</h3>
    <p>₹49999</p>
    <button onclick="addToCart('Gaming Laptop',49999)">Add to Cart</button>
  </div>

  <div class="card">
    <img src="imag/2.jpg" alt="">
    <h3>Wireless Headphones</h3>
    <p>₹1999</p>
    <button onclick="addToCart('Wireless Headphones',1999)">Add to Cart</button>
  </div>

  <div class="card">
    <img src="imag/Icon2-6.webp" alt="">
    <h3>Smart Watch</h3>
    <p>₹2499</p>
    <button onclick="addToCart('Smart Watch',2499)">Add to Cart</button>
  </div>

  <div class="card">
    <img src="imag/speaker.avif" alt="">
    <h3>Bluetooth Speaker</h3>
    <p>₹799</p>
    <button onclick="addToCart('Bluetooth Speaker',799)">Add to Cart</button>
  </div>

  <div class="card">
    <img src="imag/camara.jpeg" alt="">
    <h3>Digital Camera</h3>
    <p>₹14499</p>
    <button onclick="addToCart('Digital Camera',14499)">Add to Cart</button>
  </div>

  <div class="card">
    <img src="imag/tv.jpg" alt="">
    <h3>LED TV</h3>
    <p>₹19999</p>
    <button onclick="addToCart('LED TV',19999)">Add to Cart</button>
  </div>

</div>

<!-- ---------------- CART PANEL ---------------- -->
<div class="cart-panel" id="cart-panel">
  <button class="close-btn" onclick="toggleCart()">✖</button>
  <h2>Your Cart</h2>
  <div class="cart-items" id="cart-items"></div>
  <div class="total">Total: ₹<span id="total-price">0</span></div>
  <button class="checkout-btn">Checkout</button>
</div>

<script>
let cart = [];

function addToCart(name, price){
  let existing = cart.find(item => item.name === name);
  if(existing){
    existing.qty++;
  } else {
    cart.push({name, price, qty:1});
  }
  updateCart();
  document.getElementById("cart-panel").classList.add("active");
}

function removeFromCart(name){
  cart = cart.filter(item => item.name !== name);
  updateCart();
}

function changeQty(name, amount){
  let item = cart.find(i => i.name === name);
  if(item){
    item.qty += amount;
    if(item.qty <= 0) removeFromCart(name);
  }
  updateCart();
}

function updateCart(){
  document.getElementById("cart-count").innerText = cart.reduce((a,b)=>a+b.qty,0);
  const cartItemsDiv = document.getElementById("cart-items");
  cartItemsDiv.innerHTML = "";
  let total = 0;

  cart.forEach(item => {
    total += item.price * item.qty;
    cartItemsDiv.innerHTML += `
      <div class="cart-item">
        <span>${item.name}</span>
        <div>
          <button class="qty-btn" onclick="changeQty('${item.name}',-1)">-</button>
          ${item.qty}
          <button class="qty-btn" onclick="changeQty('${item.name}',1)">+</button>
          ₹${item.price * item.qty}
          <button onclick="removeFromCart('${item.name}')">Remove</button>
        </div>
      </div>
    `;
  });

  document.getElementById("total-price").innerText = total;
}

function toggleCart(){
  document.getElementById("cart-panel").classList.toggle("active");
}
</script>

</body>
</html>
