<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Product Cards</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        .btn {
            padding: 12px 22px;
            background: #333;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        /* No transform, no hover effects */
        .product-container {
            margin-top: 20px;
            display: grid;
            gap: 20px;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0px 2px 6px rgba(0,0,0,0.1);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: contain;
        }

        .card h3 {
            font-size: 16px;
            margin: 10px 0;
            height: 45px;
            overflow: hidden;
        }

        .price {
            font-size: 18px;
            font-weight: bold;
            color: #009688;
        }

        .category {
            font-size: 14px;
            color: gray;
        }
    </style>

</head>

<body>//next topics
//dog.API
//dog.api.async
    <button class="btn">Load Products</button>

    <div class="product-container" id="productBox"></div>

    <script>
        let btn = document.querySelector(".btn")
        let productBox = document.getElementById("productBox")

        btn.addEventListener("click", () => {

            console.log("Button clicked. Fetching products...");

            fetch('https://fakestoreapi.com/products')
                .then(res => {
                    console.log("Fetch response:", res);
                    return res.json()
                })
                .then(data => {
                    console.log("API Data Received:", data);  // WORKS 100%
                    showProducts(data)
                })
                .catch(err => {
                    console.log("Error:", err);
                })
        })

        function showProducts(products) {

            productBox.innerHTML = ""
            console.log("Showing first 15 products...");

            for (let i = 0; i < 15; i++) {
                let p = products[i]
                console.log("Product", i + 1, p);

                const card = document.createElement("div")
                card.classList.add("card")

                card.innerHTML = `
                    <img src="${p.image}">
                    <h3>${p.title}</h3>
                    <p class="price">$${p.price}</p>
                    <p class="category">${p.category}</p>
                `

                productBox.appendChild(card)
            }
        }
    </script>

    // task make 2 seconds gap image and ask user how many images user wants 

</body>

</html>
