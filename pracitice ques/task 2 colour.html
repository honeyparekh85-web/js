<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .parent {
            display: flex;
            gap: 50px;
        }
        .box {
            height: 200px;
            width: 200px;
            border: 5px solid red;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 25px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="parent">
        <div class="box">Box 1</div>
        <div class="box">Box 2</div>
        <div class="box">Box 3</div>
    </div>

    <script>
        let boxes = document.querySelectorAll(".box");

        boxes.forEach((box) => {
            box.addEventListener("click", () => {
                let color = prompt("Enter background color for this box:");
                if (color) {
                    box.style.backgroundColor = color;  // change ONLY background color
                }
            });
        });
    </script>

</body>
</html>
